server.port=8082

# Database
spring.datasource.url=jdbc:postgresql://uat-db.yourdomain.com:5432/chatapp
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# Redis
spring.data.redis.host=uat-redis.yourdomain.com
spring.data.redis.port=6379

# Eureka
eureka.client.service-url.defaultZone=http://uat-registry.yourdomain.com:8761/eureka/

# JWT
jwt.secret=${JWT_SECRET}
